name: sc4001
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # PyTorch（有 NVIDIA GPU 用这行；纯 CPU 则把 pytorch-cuda 删掉）
  - pytorch=2.2
  - torchvision
  - pytorch-cuda=11.8
  - pip:
    - transformers==4.40.0
    - pytorch-lightning==2.2.4
    - torchmetrics==1.3.2
    - Pillow==10.3.0
    - accelerate==0.29.3
